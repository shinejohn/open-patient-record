name: vault-server tests

on:
  push:
    branches: [main]
    paths: ['reference-impl/**', '.github/workflows/vault-server-tests.yml']
  pull_request:
    paths: ['reference-impl/**', '.github/workflows/vault-server-tests.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opr_vault_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: reference-impl/server

    steps:
      - uses: actions/checkout@v4

      # PHP version MUST match composer.json's config.platform.php — the lockfile
      # resolves against that pin (Laravel 13 / Symfony 8 floor is PHP 8.4.1).
      # Runtime drift between lockfile and CI is a known recurring failure mode.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run the conformance-seed suite (PostgreSQL)
        run: ./vendor/bin/phpunit --no-coverage
